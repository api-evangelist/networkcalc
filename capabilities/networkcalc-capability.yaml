naftiko: 1.0.0-alpha2
info:
  label: NetworkCalc API
  description: NetworkCalc provides RESTful APIs for network and security tools including a subnet calculator, DNS tools,
    security tools (TLS/SSL inspection, password generation), encoders, and a binary converter. The public APIs return JSON
    responses over HTTPS and use common HTTP verbs.
  tags:
  - Networkcalc
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: networkcalc
    baseUri: https://networkcalc.com/api
    description: NetworkCalc API HTTP API.
    resources:
    - name: ip-address
      path: /ip/{address}
      operations:
      - name: get-ip-address
        method: GET
        description: Subnet calculator (IPv4)
        inputParameters:
        - name: address
          in: path
          type: string
          required: true
          description: IPv4 address with CIDR mask, for example 192.168.1.0/24.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ipv6-address
      path: /ipv6/{address}
      operations:
      - name: get-ipv6-address
        method: GET
        description: Subnet calculator (IPv6)
        inputParameters:
        - name: address
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dns-lookup-domain
      path: /dns/lookup/{domain}
      operations:
      - name: get-dns-lookup-domain
        method: GET
        description: DNS lookup
        inputParameters:
        - name: domain
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: security-scan-host
      path: /security/scan/{host}
      operations:
      - name: get-security-scan-host
        method: GET
        description: SSL/TLS security scan
        inputParameters:
        - name: host
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: encoder-type-value
      path: /encoder/{type}/{value}
      operations:
      - name: get-encoder-type-value
        method: GET
        description: Encode or decode a value
        inputParameters:
        - name: type
          in: path
          type: string
          required: true
        - name: value
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: binary-value
      path: /binary/{value}
      operations:
      - name: get-binary-value
        method: GET
        description: Binary conversion
        inputParameters:
        - name: value
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: networkcalc-rest
    description: REST adapter for NetworkCalc API.
    resources:
    - path: /ip/{address}
      name: get-ip-address
      operations:
      - method: GET
        name: get-ip-address
        description: Subnet calculator (IPv4)
        call: networkcalc.get-ip-address
        with:
          address: rest.address
        outputParameters:
        - type: object
          mapping: $.
    - path: /ipv6/{address}
      name: get-ipv6-address
      operations:
      - method: GET
        name: get-ipv6-address
        description: Subnet calculator (IPv6)
        call: networkcalc.get-ipv6-address
        with:
          address: rest.address
        outputParameters:
        - type: object
          mapping: $.
    - path: /dns/lookup/{domain}
      name: get-dns-lookup-domain
      operations:
      - method: GET
        name: get-dns-lookup-domain
        description: DNS lookup
        call: networkcalc.get-dns-lookup-domain
        with:
          domain: rest.domain
        outputParameters:
        - type: object
          mapping: $.
    - path: /security/scan/{host}
      name: get-security-scan-host
      operations:
      - method: GET
        name: get-security-scan-host
        description: SSL/TLS security scan
        call: networkcalc.get-security-scan-host
        with:
          host: rest.host
        outputParameters:
        - type: object
          mapping: $.
    - path: /encoder/{type}/{value}
      name: get-encoder-type-value
      operations:
      - method: GET
        name: get-encoder-type-value
        description: Encode or decode a value
        call: networkcalc.get-encoder-type-value
        with:
          type: rest.type
          value: rest.value
        outputParameters:
        - type: object
          mapping: $.
    - path: /binary/{value}
      name: get-binary-value
      operations:
      - method: GET
        name: get-binary-value
        description: Binary conversion
        call: networkcalc.get-binary-value
        with:
          value: rest.value
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: networkcalc-mcp
    transport: http
    description: MCP adapter for NetworkCalc API for AI agent use.
    tools:
    - name: get-ip-address
      description: Subnet calculator (IPv4)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: networkcalc.get-ip-address
      with:
        address: tools.address
      inputParameters:
      - name: address
        type: string
        description: IPv4 address with CIDR mask, for example 192.168.1.0/24.
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: get-ipv6-address
      description: Subnet calculator (IPv6)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: networkcalc.get-ipv6-address
      with:
        address: tools.address
      inputParameters:
      - name: address
        type: string
        description: address
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: get-dns-lookup-domain
      description: DNS lookup
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: networkcalc.get-dns-lookup-domain
      with:
        domain: tools.domain
      inputParameters:
      - name: domain
        type: string
        description: domain
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: get-security-scan-host
      description: SSL/TLS security scan
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: networkcalc.get-security-scan-host
      with:
        host: tools.host
      inputParameters:
      - name: host
        type: string
        description: host
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: get-encoder-type-value
      description: Encode or decode a value
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: networkcalc.get-encoder-type-value
      with:
        type: tools.type
        value: tools.value
      inputParameters:
      - name: type
        type: string
        description: type
        required: true
      - name: value
        type: string
        description: value
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: get-binary-value
      description: Binary conversion
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: networkcalc.get-binary-value
      with:
        value: tools.value
      inputParameters:
      - name: value
        type: string
        description: value
        required: true
      outputParameters:
      - type: object
        mapping: $.
