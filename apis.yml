aid: networkcalc
name: NetworkCalc
description: >-
  NetworkCalc provides a free RESTful API platform for monitoring and managing
  business networks and domains. Public APIs include a subnet calculator, DNS
  tools, security tools, encoder, and binary converter, with additional
  authenticated APIs for alerts, authorization, domains, reports, and subnets.
