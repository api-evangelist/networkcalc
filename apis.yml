apis:
  - aid: networkcalc:networkcalc
    name: NetworkCalc
    description: >-
      The NetworkCalc API provides RESTful endpoints for subnet calculation
      (IPv4 and IPv6), DNS lookups, SSL/TLS security inspection, encoding and
      decoding utilities, and binary/decimal/hex conversion. Responses are
      JSON over HTTPS. Account-level APIs cover alerts, authorization,
      domains, reports, and subnets.
